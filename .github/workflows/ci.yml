name: CI

on:
  push:
    branches: [main, master, development]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
          BETTER_AUTH_SECRET: ci-build-placeholder-secret-min-32-chars-long
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ci-anon-key-placeholder-not-a-secret
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-key-placeholder-not-a-secret
          NEXT_PUBLIC_SITE_URL: http://localhost:3000
          BETTER_AUTH_URL: http://localhost:3000
          TRIGGER_SECRET_KEY: tr_dev_ci_placeholder
